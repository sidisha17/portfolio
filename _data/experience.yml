# Work experience , shown as a timeline on the homepage (most recent first).
# Fields: role, company, duration (optional), description
- role: "Research Extern"
  company: "Google DeepMind"
  description: >-
    Worked with Google DeepMind on efficient transformer scaling , growing a
    model's representational capacity without the quadratic cost of widening it.
    I extended a 135M-parameter GPT-2-style baseline with the leading
    residual-stream methods (mHC, VWN, AltUp), pre-trained them on 13.5B tokens,
    and produced the first like-for-like comparison of these approaches at small
    scale , pairing loss and downstream evaluation with a careful FLOPs and
    throughput cost analysis, plus interpretability probes into how the streams
    actually behave.

- role: "Senior Analyst, Credit & Fraud Risk | Data & ML Engineering"
  company: "American Express, India"
  duration: "Aug 2022 – May 2024"
  description: >-
    I worked on Amex's XGBoost credit-risk model, which scores how likely
    customers are to default. I traced and fixed issues in the upstream "smart"
    feature databases (themselves built from complex aggregations of many raw
    sources), engineered new predictive features, and assembled the training
    datasets used to retrain the model, work that contributed to $14.7M in
    recoveries through better default-risk identification. After deployment, I
    built an automated monitoring system that continuously compares predicted
    against actual default rates and alerts leadership the moment they diverge, so
    accuracy regressions and data drift could be caught and corrected quickly.

- role: "Programmer Analyst, Credit & Fraud Risk | Data & ML Engineering"
  company: "American Express, India"
  duration: "Aug 2020 – Jul 2022"
  description: >-
    I owned the migration of Amex's merchant exposure-calculation system, the
    engine that estimates how much money is at risk when a merchant may not
    deliver. (A clear example is an airline ticket: Amex pays at purchase, but if
    the airline goes bankrupt before the customer flies, Amex has to refund the
    cardholders.) I moved millions of records from roughly 20 raw sources
    (credit-bureau data, airline-ticket data, transaction feeds, and more) onto a
    Hadoop big-data platform using PySpark and Hive, then re-implemented the
    intricate aggregation logic behind around 20 exposure components spanning some
    200K merchants. Retiring the legacy system saved the company about $45M while
    giving downstream credit-risk models cleaner, more scalable inputs.
