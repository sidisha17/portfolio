<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}" data-theme="light">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="icon" href="{{ site.logo | default: '/media/sid.jpeg' | relative_url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

    <!-- Set theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header class="site-nav">
      <div class="nav-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="nav-links">
          <a href="{{ '/' | relative_url }}#projects">Projects</a>
          <a href="{{ '/' | relative_url }}#publications">Publications</a>
          <a href="{{ '/' | relative_url }}#work-experience">Experience</a>
          <a href="{{ '/' | relative_url }}#education">Education</a>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
            <svg class="icon icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="icon icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </nav>
      </div>
    </header>

    {{ content }}

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}</p>
        <p class="muted">Built with Jekyll &middot; Hosted on GitHub Pages</p>
      </div>
    </footer>

    <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  </body>
</html>
